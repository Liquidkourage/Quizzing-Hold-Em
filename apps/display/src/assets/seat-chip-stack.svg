<?xml version="1.0" encoding="UTF-8"?>
<!-- Original vector for Quizz'em display: mini stack for venue seat bankrolls -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 64" width="56" height="64" aria-hidden="true">
  <defs>
    <linearGradient id="chipEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <radialGradient id="chipTop1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <radialGradient id="chipTop2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </radialGradient>
    <radialGradient id="chipTop3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </radialGradient>
  </defs>
  <!-- Bottom chip -->
  <ellipse cx="28" cy="46" rx="22" ry="9" fill="url(#chipEdge)"/>
  <ellipse cx="28" cy="44" rx="20" ry="7.5" fill="url(#chipTop1)"/>
  <ellipse cx="28" cy="44" rx="9" ry="3.2" fill="none" stroke="#14532d" stroke-opacity="0.45" stroke-width="1.2"/>
  <!-- Middle chip -->
  <ellipse cx="28" cy="34" rx="22" ry="9" fill="url(#chipEdge)"/>
  <ellipse cx="28" cy="32" rx="20" ry="7.5" fill="url(#chipTop2)"/>
  <ellipse cx="28" cy="32" rx="9" ry="3.2" fill="none" stroke="#854d0e" stroke-opacity="0.5" stroke-width="1.2"/>
  <!-- Top chip -->
  <ellipse cx="28" cy="22" rx="22" ry="9" fill="url(#chipEdge)"/>
  <ellipse cx="28" cy="20" rx="20" ry="7.5" fill="url(#chipTop3)"/>
  <ellipse cx="28" cy="20" rx="9" ry="3.2" fill="none" stroke="#7f1d1d" stroke-opacity="0.45" stroke-width="1.2"/>
</svg>
