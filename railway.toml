# Monorepo: Express serves apps/display/dist (and host/player). Root build is required.
# https://docs.railway.app/reference/config-as-code

[build]
# `npm ci` can hit EBUSY on cached `apps/*/node_modules/.vite`; Vite `cacheDir` is under /tmp now.
# This script chmod+retries recursive rm — do not hide failures with `2>/dev/null` on the outer rm alone.
buildCommand = "sh scripts/railway-build.sh"

[deploy]
startCommand = "npm start"
