# Monorepo: Express serves apps/display/dist (and host/player). Root build is required.
# https://docs.railway.app/reference/config-as-code

[build]
# `npm ci` can hit EBUSY removing `node_modules/.vite` (Vite cache) when Docker/Railway layers
# left a prior install. Nuke all workspace `node_modules` first, then a clean `npm ci`.
buildCommand = "find . -depth -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true; npm ci && npm run build"

[deploy]
startCommand = "npm start"
