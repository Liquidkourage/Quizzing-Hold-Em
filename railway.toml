# Monorepo: Express serves apps/display/dist (and host/player). Root build is required.
# https://docs.railway.app/reference/config-as-code

[build]
# Railpack mounts Vite caches at apps/*/node_modules/.vite during the *build* step; never `rm` or `npm ci` there
# (EBUSY). Install runs in a separate Railpack step; this command is only `npm run build`.
buildCommand = "sh scripts/railway-build.sh"

[deploy]
startCommand = "npm start"
